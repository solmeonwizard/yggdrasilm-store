backend:
  name: github
  repo: solmeonwizard/yggdrasilm-store
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "პროდუქტები"
    folder: "data" # აქ შეიქმნება თითოეული პროდუქტის JSON
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "დასახელება", name: "title", widget: "string" }
      - { label: "ფასი", name: "price", widget: "number" }
      - { label: "სურათი", name: "image", widget: "image" }
      - { label: "აღწერა", name: "description", widget: "markdown" }
      - { label: "დამატებითი ინფო", name: "modal_info", widget: "text", required: false }

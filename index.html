<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>იგდრასილი - დაჯავშნა</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-purple: #1a0f1f;
            --white: #ffffff;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark-purple);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 50px 20px;
            width: 100%;
            border-bottom: 1px solid var(--gold);
        }
        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; }
        
        .booking-section {
            width: 90%;
            max-width: 500px;
            padding: 40px 20px;
        }
        
        form {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--gold);
        }
        
        label { display: block; margin-bottom: 8px; color: var(--gold); }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            background: var(--gold);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover { background: #b8962d; }

        #status {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            display: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>იგდრასილი</h1>
    <p>ტაროლოგიური კონსულტაცია და სულიერი გზამკვლევი</p>
</header>

<section class="booking-section">
    <h2 style="text-align: center; color: var(--gold);">ჩაეწერე კონსულტაციაზე</h2>
    
    <form id="bookingForm" action="https://formspree.io/f/xdablekz" method="POST">
        <label>სახელი და გვარი</label>
        <input type="text" name="name" placeholder="თქვენი სახელი" required>
        
        <label>ტელეფონის ნომერი</label>
        <input type="tel" name="phone" placeholder="599 XX XX XX" required>
        
        <label>კონსულტაციის ტიპი</label>
        <select name="type">
            <option value="ზოგადი">ზოგადი გაშლა</option>
            <option value="პირადი">პირადი ურთიერთობები</option>
            <option value="კარიერა">კარიერა და ფინანსები</option>
        </select>

        <label>თქვენი კითხვა (სურვილისამებრ)</label>
        <textarea name="message" rows="4"></textarea>
        
        <button type="submit" class="btn">დაჯავშნა</button>
        <p id="status"></p>
    </form>
</section>

<script>
    const form = document.getElementById("bookingForm");
    
    async function handleSubmit(event) {
      event.preventDefault();
      const status = document.getElementById("status");
      const data = new FormData(event.target);
      
      status.style.display = "block";
      status.innerHTML = "იგზავნება...";
      status.style.color = "white";

      fetch(event.target.action, {
        method: form.method,
        body: data,
        headers: { 'Accept': 'application/json' }
      }).then(response => {
        if (response.ok) {
          status.innerHTML = "მადლობა! თქვენი მოთხოვნა მიღებულია.";
          status.style.color = "#4CAF50";
          form.reset();
        } else {
          status.innerHTML = "შეცდომა! სცადეთ მოგვიანებით.";
          status.style.color = "#f44336";
        }
      }).catch(error => {
        status.innerHTML = "კავშირის შეცდომა.";
        status.style.color = "#f44336";
      });
    }
    form.addEventListener("submit", handleSubmit)
</script>

</body>
</html>

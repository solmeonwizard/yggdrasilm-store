<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>იგდრასილი - Yggdrasil Store</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --dark-purple: #1a0f1f; 
            --white: #ffffff; 
            --card-bg: rgba(255, 255, 255, 0.05); 
            --modal-bg: #120a14; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--dark-purple); 
            color: var(--white); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        header { 
            text-align: center; 
            padding: 40px 20px; 
            width: 100%; 
            border-bottom: 1px solid var(--gold); 
        }

        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin: 0 0 20px 0; }

        nav { display: flex; gap: 30px; justify-content: center; }
        nav a { 
            color: var(--white); 
            text-decoration: none; 
            text-transform: uppercase; 
            font-weight: bold; 
            letter-spacing: 2px; 
            cursor: pointer; 
            transition: 0.3s; 
            padding-bottom: 5px; 
        }
        nav a:hover, nav a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .container { width: 90%; max-width: 1200px; padding: 40px 0; display: none; }
        .active-section { display: block; }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        .product-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
            transition: 0.4s; 
        }
        .product-card:hover { 
            border-color: var(--gold); 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }

        .product-card img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-bottom: 15px; 
        }

        .product-card h3 { color: var(--gold); margin: 10px 0; font-size: 1.2em; }
        .product-card .price { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; }
        .product-card .short-desc { font-size: 0.9em; color: #aaa; margin-bottom: 15px; height: 40px; overflow: hidden; }

        /* Modal Styles */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 2000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.9); 
            justify-content: center; 
            align-items: center; 
        }
        .modal-content { 
            background: var(--modal-bg); 
            display: flex; 
            max-width: 900px; 
            width: 95%; 
            max-height: 90vh; 
            border: 1px solid var(--gold); 
            border-radius: 15px; 
            overflow: hidden; 
            position: relative; 
        }
        .modal-image-side { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        .modal-image-side img { width: 100%; height: 100%; object-fit: contain; }
        .modal-info-side { flex: 1; padding: 40px; overflow-y: auto; }

        .btn { 
            width: 100%; 
            background: var(--gold); 
            color: #000; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s; 
        }
        .btn:hover { background: #b8962d; transform: scale(1.02); }

        @media (max-width: 768px) {
            .modal-content { flex-direction: column; }
            .modal-image-side { height: 300px; }
        }
    </style>
</head>
<body>

<header>
    <h1>YGGDRASIL</h1>
    <nav>
        <a onclick="showSection('products')" id="nav-products" class="active">კოლექცია</a>
        <a onclick="showSection('booking')" id="nav-booking">დაჯავშნა</a>
    </nav>
</header>

<div id="products" class="container active-section">
    <div class="product-grid" id="productContainer">
        <p style="text-align: center; width: 100%;">სამყარო იტვირთება...</p>
    </div>
</div>

<div id="booking" class="container">
    <div style="max-width: 600px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--gold);">
        <h2 style="text-align: center; color: var(--gold);">ჩაეწერე კონსულტაციაზე</h2>
        <form action="https://formspree.io/f/xdablekz" method="POST">
            <label>სახელი</label>
            <input type="text" name="name" style="width:100%; padding:10px; margin:10px 0; background:#2a1a2e; border:1px solid var(--gold); color:white;" required>
            <label>ტელეფონი</label>
            <input type="tel" name="phone" style="width:100%; padding:10px; margin:10px 0; background:#2a1a2e; border:1px solid var(--gold); color:white;" required>
            <button type="submit" class="btn" style="margin-top:20px;">გაგზავნა</button>
        </form>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:15px; font-size:35px; color:var(--gold); cursor:pointer; z-index:10;" onclick="closeModal()">&times;</span>
        <div class="modal-image-side"><img id="modalImg" src=""></div>
        <div class="modal-info-side">
            <h2 id="modalTitle" style="color:var(--gold); margin-top:0;"></h2>
            <p id="modalPrice" style="font-size:1.4em; font-weight:bold; color:var(--white);"></p>
            <hr style="border: 0; border-top: 1px solid rgba(212, 175, 55, 0.2); margin: 20px 0;">
            <div id="modalDesc" style="line-height: 1.6; color: #ddd; margin-bottom: 30px;"></div>
            <button class="btn" onclick="showSection('booking')">შეკვეთა / დაჯავშნა</button>
        </div>
    </div>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active-section'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        document.getElementById('nav-' + id).classList.add('active');
        if(id !== 'productModal') window.scrollTo(0,0);
        if(document.getElementById('productModal').style.display === 'flex') closeModal();
    }

    async function fetchProducts() {
        const container = document.getElementById('productContainer');
        const repo = 'solmeonwizard/yggdrasilm-store';
        
        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/data`);
            const files = await response.json();
            container.innerHTML = '';

            for (const file of files) {
                if (file.name.endsWith('.json')) {
                    const res = await fetch(file.download_url);
                    const p = await res.json();
                    
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    // ვამუშავებთ აღწერას, რომ Enter-ები <br>-ებად იქცეს
                    const cleanDesc = (p.description || "აღწერა არ არის").replace(/\n/g, '<br>');
                    const cleanModalInfo = (p.modal_info || "").replace(/\n/g, '<br>');
                    const displayDesc = cleanModalInfo || cleanDesc;

                    card.innerHTML = `
                        <img src="${p.image}" alt="${p.title}" loading="lazy" 
                             onclick="openModal(\`${p.image}\`, \`${p.title}\`, \`${p.price}\`, \`${displayDesc}\`)">
                        <h3>${p.title}</h3>
                        <div class="price">${p.price} ₾</div>
                        <div class="short-desc">${p.description ? p.description.substring(0, 60) + '...' : ''}</div>
                        <button class="btn" style="padding: 8px;" onclick="openModal(\`${p.image}\`, \`${p.title}\`, \`${p.price}\`, \`${displayDesc}\`)">ნახვა</button>
                    `;
                    container.appendChild(card);
                }
            }
        } catch (e) { 
            console.error(e);
            container.innerHTML = "<p style='grid-column: 1/-1;'>შეცდომა პროდუქტების ჩატვირთვისას. სცადეთ მოგვიანებით.</p>"; 
        }
    }

    function openModal(img, title, price, desc) {
        document.getElementById('modalImg').src = img;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalPrice').innerText = price + ' ₾';
        document.getElementById('modalDesc').innerHTML = desc;
        document.getElementById('productModal').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // გათიშავს სკროლს ქვეშ
    }

    function closeModal() { 
        document.getElementById('productModal').style.display = 'none'; 
        document.body.style.overflow = 'auto'; // აღადგენს სკროლს
    }

    // დახურვა გარეთ დაჭერისას
    window.onclick = function(event) {
        const modal = document.getElementById('productModal');
        if (event.target == modal) closeModal();
    }

    window.onload = fetchProducts;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>იგდრასილი - მაღაზია და დაჯავშნა</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --dark-purple: #1a0f1f;
            --white: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark-purple);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            border-bottom: 1px solid var(--gold);
        }
        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; }

        nav { display: flex; gap: 30px; margin-bottom: 20px; justify-content: center; }
        nav a {
            color: var(--white);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            padding-bottom: 5px;
        }
        nav a:hover, nav a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .container { width: 90%; max-width: 1000px; padding: 40px 0; display: none; }
        .active-section { display: block; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        .product-card h3 { color: var(--gold); margin: 10px 0; }
        .product-card .price { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; }

        form { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); max-width: 500px; margin: 0 auto; }
        label { display: block; margin-bottom: 8px; color: var(--gold); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <h1>იგდრასილი</h1>
    <nav>
        <a onclick="showSection('products')" id="nav-products" class="active">პროდუქტები</a>
        <a onclick="showSection('booking')" id="nav-booking">დაჯავშნა</a>
    </nav>
</header>

<div id="products" class="container active-section">
    <div class="product-grid" id="productContainer">
        <p style="text-align: center; width: 100%;">იტვირთება...</p>
    </div>
</div>

<div id="booking" class="container">
    <form id="bookingForm" action="https://formspree.io/f/xdablekz" method="POST">
        <h2 style="text-align: center; color: var(--gold);">ჩაეწერე კონსულტაციაზე</h2>
        <label>სახელი და გვარი</label>
        <input type="text" name="name" required>
        <label>ტელეფონის ნომერი</label>
        <input type="tel" name="phone" required>
        <label>კონსულტაციის ტიპი</label>
        <select name="type">
            <option value="ზოგადი">ზოგადი გაშლა</option>
            <option value="პირადი">პირადი ურთიერთობები</option>
            <option value="კარიერა">კარიერა და ფინანსები</option>
        </select>
        <label>თქვენი კითხვა</label>
        <textarea name="message" rows="4"></textarea>
        <button type="submit" class="btn">დაჯავშნა</button>
    </form>
</div>

<script>
    function showSection(sectionId) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active-section'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active-section');
        document.getElementById('nav-' + sectionId).classList.add('active');
    }

    async function fetchProducts() {
        const container = document.getElementById('productContainer');
        const repoOwner = 'solmeonwizard'; 
        const repoName = 'yggdrasilm-store';

        try {
            const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/data`);
            if (!response.ok) throw new Error('ვერ მოიძებნა მონაცემები');
            const files = await response.json();
            
            container.innerHTML = '';
            let hasProducts = false;

            for (const file of files) {
                if (file.name.endsWith('.json') && file.name !== 'products.json') {
                    const res = await fetch(file.download_url);
                    const product = await res.json();
                    hasProducts = true;
                    
                    container.innerHTML += `
                        <div class="product-card">
                            <img src="${product.image}" alt="${product.title}">
                            <h3>${product.title}</h3>
                            <p>${product.description}</p>
                            <div class="price">${product.price} ₾</div>
                            <button class="btn" onclick="alert('დაუკავშირდით ადმინისტრატორს')">ყიდვა</button>
                        </div>
                    `;
                }
            }
            if (!hasProducts) container.innerHTML = "<p>პროდუქტები ჯერ არ არის.</p>";
        } catch (error) {
            container.innerHTML = "<p>ჩატვირთვის შეცდომა.</p>";
        }
    }

    window.onload = fetchProducts;

    if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
            if (!user) {
                window.netlifyIdentity.on("login", () => {
                    document.location.href = "/admin/";
                });
            }
        });
    }
</script>
</body>
</html>

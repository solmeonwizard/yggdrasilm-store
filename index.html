<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>იგდრასილი - მაღაზია და დაჯავშნა</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-purple: #1a0f1f;
            --white: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --modal-bg: #120a14;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark-purple);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            border-bottom: 1px solid var(--gold);
        }
        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; }

        nav { display: flex; gap: 30px; margin-bottom: 20px; justify-content: center; }
        nav a {
            color: var(--white);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            padding-bottom: 5px;
        }
        nav a:hover, nav a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .container { width: 90%; max-width: 1200px; padding: 40px 0; display: none; }
        .active-section { display: block; }

        /* პროდუქტების ბადე */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; cursor: pointer; }
        .product-card h3 { color: var(--gold); margin: 15px 0 5px; }
        .product-card .price { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; color: var(--white); }

        /* მოდალის სტილები (Instagram Style) */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--modal-bg);
            display: flex;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            border: 1px solid var(--gold);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .modal-image-side {
            flex: 1.5;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-image-side img { max-width: 100%; max-height: 90vh; object-fit: contain; }
        .modal-info-side {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(212, 175, 55, 0.3);
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            right: 20px; top: 15px;
            font-size: 35px;
            color: var(--gold);
            cursor: pointer;
            z-index: 2100;
        }
        .modal-info-side h2 { color: var(--gold); margin-top: 0; }
        .modal-info-side .modal-description { line-height: 1.6; color: #ccc; flex-grow: 1; margin: 20px 0; }
        
        /* ფორმა */
        form { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); max-width: 500px; margin: 0 auto; }
        label { display: block; margin-bottom: 8px; color: var(--gold); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #b8972f; }

        @media (max-width: 850px) {
            .modal-content { flex-direction: column; overflow-y: auto; }
            .modal-image-side { min-height: 300px; }
            .modal-info-side { border-left: none; border-top: 1px solid rgba(212, 175, 55, 0.3); }
        }
    </style>
</head>
<body>

<header>
    <h1>იგდრასილი</h1>
    <nav>
        <a onclick="showSection('products')" id="nav-products" class="active">პროდუქტები</a>
        <a onclick="showSection('booking')" id="nav-booking">დაჯავშნა</a>
    </nav>
</header>

<div id="products" class="container active-section">
    <div class="product-grid" id="productContainer">
        <p style="text-align: center; width: 100%;">იტვირთება...</p>
    </div>
</div>

<div id="booking" class="container">
    <form action="https://formspree.io/f/xdablekz" method="POST">
        <h2 style="text-align: center; color: var(--gold);">ჩაეწერე კონსულტაციაზე</h2>
        <label>სახელი და გვარი</label>
        <input type="text" name="name" required>
        <label>ტელეფონის ნომერი</label>
        <input type="tel" name="phone" required>
        <label>კონსულტაციის ტიპი</label>
        <select name="type">
            <option value="ზოგადი">ზოგადი გაშლა</option>
            <option value="პირადი">პირადი ურთიერთობები</option>
            <option value="კარიერა">კარიერა და ფინანსები</option>
        </select>
        <label>თქვენი კითხვა</label>
        <textarea name="message" rows="4"></textarea>
        <button type="submit" class="btn">დაჯავშნა</button>
    </form>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-image-side">
            <img id="modalImg" src="" alt="">
        </div>
        <div class="modal-info-side">
            <h2 id="modalTitle"></h2>
            <div id="modalPrice" style="font-size: 1.5em; font-weight: bold; margin-bottom: 10px;"></div>
            <div class="modal-description" id="modalDesc"></div>
            <button class="btn" onclick="alert('შესაკვეთად მოგვწერეთ ნომერზე ან გამოიყენეთ დაჯავშნის ფორმა')">შეკვეთა</button>
        </div>
    </div>
</div>

<script>
    function showSection(sectionId) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active-section'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active-section');
        document.getElementById('nav-' + sectionId).classList.add('active');
    }

    async function fetchProducts() {
        const container = document.getElementById('productContainer');
        
        try {
            // Cloudflare Pages-ზე მონაცემებს ვიღებთ პირდაპირ ლოკალური ფაილიდან
            const response = await fetch('/data/products.json');
            if (!response.ok) throw new Error('მონაცემები ვერ მოიძებნა');
            
            const products = await response.json();
            container.innerHTML = '';

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                // ტექსტის დამუშავება ახალი ხაზებისთვის
                const description = (p.modal_info || p.description || "").replace(/\n/g, '<br>');
                
                card.innerHTML = `
                    <img src="${p.image}" alt="${p.title}" onclick="openModal('${p.image}', '${p.title.replace(/'/g, "\\'")}', '${p.price}', '${description.replace(/'/g, "\\'")}')">
                    <h3>${p.title}</h3>
                    <div class="price">${p.price} ₾</div>
                    <button class="btn" onclick="openModal('${p.image}', '${p.title.replace(/'/g, "\\'")}', '${p.price}', '${description.replace(/'/g, "\\'")}')">ნახვა</button>
                `;
                container.appendChild(card);
            });

            if (products.length === 0) container.innerHTML = "<p>პროდუქტები ჯერ არ არის დამატებული.</p>";
        } catch (error) {
            console.error('Error fetching products:', error);
            container.innerHTML = "<p>მონაცემების ჩატვირთვა ვერ მოხერხდა. სცადეთ გვერდის განახლება.</p>";
        }
    }

    function openModal(img, title, price, desc) {
        document.getElementById('modalImg').src = img;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalPrice').innerText = price + ' ₾';
        document.getElementById('modalDesc').innerHTML = desc;
        document.getElementById('productModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('productModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('productModal');
        if (event.target == modal) closeModal();
    }

    window.onload = fetchProducts;
</script>

</body>
</html>

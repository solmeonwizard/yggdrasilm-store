<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>იგდრასილი - მაღაზია და დაჯავშნა</title>
    <style>
        :root { --gold: #d4af37; --dark-purple: #1a0f1f; --white: #ffffff; --card-bg: rgba(255, 255, 255, 0.05); --modal-bg: #120a14; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--dark-purple); color: var(--white); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; padding: 40px 20px; width: 100%; border-bottom: 1px solid var(--gold); }
        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; }
        nav { display: flex; gap: 30px; margin-bottom: 20px; justify-content: center; }
        nav a { color: var(--white); text-decoration: none; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: 0.3s; padding-bottom: 5px; }
        nav a:hover, nav a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .container { width: 90%; max-width: 1200px; padding: 40px 0; display: none; }
        .active-section { display: block; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: var(--card-bg); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s; }
        .product-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; cursor: pointer; }
        .product-card h3 { color: var(--gold); margin: 15px 0 5px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-content { background: var(--modal-bg); display: flex; max-width: 1000px; width: 90%; max-height: 90vh; border: 1px solid var(--gold); border-radius: 12px; overflow: hidden; position: relative; }
        .modal-image-side { flex: 1.5; background: #000; display: flex; align-items: center; justify-content: center; }
        .modal-image-side img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .modal-info-side { flex: 1; padding: 30px; overflow-y: auto; }
        .btn { width: 100%; background: var(--gold); color: #000; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        @media (max-width: 850px) { .modal-content { flex-direction: column; } }
    </style>
</head>
<body>

<header>
    <h1>იგდრასილი</h1>
    <nav>
        <a onclick="showSection('products')" id="nav-products" class="active">პროდუქტები</a>
        <a onclick="showSection('booking')" id="nav-booking">დაჯავშნა</a>
    </nav>
</header>

<div id="products" class="container active-section">
    <div class="product-grid" id="productContainer">
        <p style="text-align: center; width: 100%;">იტვირთება...</p>
    </div>
</div>

<div id="booking" class="container">
    <!-- შენი ფორმა აქ რჩება უცვლელი -->
    <h2 style="text-align: center; color: var(--gold);">ჩაეწერე კონსულტაციაზე</h2>
    <form action="https://formspree.io/f/xdablekz" method="POST" style="max-width: 500px; margin: auto;">
        <input type="text" name="name" placeholder="სახელი და გვარი" required>
        <input type="tel" name="phone" placeholder="ტელეფონი" required>
        <button type="submit" class="btn">გაგზავნა</button>
    </form>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:10px; font-size:30px; color:var(--gold); cursor:pointer;" onclick="closeModal()">&times;</span>
        <div class="modal-image-side"><img id="modalImg" src=""></div>
        <div class="modal-info-side">
            <h2 id="modalTitle" style="color:var(--gold)"></h2>
            <p id="modalPrice" style="font-weight:bold; font-size:1.2em"></p>
            <div id="modalDesc" style="color:#ccc; margin-bottom:20px"></div>
            <button class="btn" onclick="showSection('booking')">შეკვეთა</button>
        </div>
    </div>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active-section'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        document.getElementById('nav-' + id).classList.add('active');
        if(id === 'productModal') closeModal();
    }

    async function fetchProducts() {
        const container = document.getElementById('productContainer');
        const repo = 'solmeonwizard/yggdrasilm-store';
        
        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/data`);
            const files = await response.json();
            container.innerHTML = '';

            for (const file of files) {
                if (file.name.endsWith('.json')) {
                    const res = await fetch(file.download_url);
                    const p = await res.json();
                    
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${p.image}" onclick="openModal('${p.image}', '${p.title}', '${p.price}', '${(p.modal_info || p.description || "").replace(/\n/g, '<br>')}')">
                        <h3>${p.title}</h3>
                        <p>${p.price} ₾</p>
                    `;
                    container.appendChild(card);
                }
            }
        } catch (e) { container.innerHTML = "შეცდომა ჩატვირთვისას."; }
    }

    function openModal(img, title, price, desc) {
        document.getElementById('modalImg').src = img;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalPrice').innerText = price + ' ₾';
        document.getElementById('modalDesc').innerHTML = desc;
        document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    window.onload = fetchProducts;
</script>
</body>
</html>
